        .profile img{
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        .profile h2{
            margin-bottom: 10px;
        }
        .profile p{
            margin-bottom: 5px;
        }
        .profile button{
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
